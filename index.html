<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="timer-container">
            <button id="pomodoroBtn" class="active">Pomodoro</button> 
            <button id="shortBreakBtn">Короткий</button> 
            <button id="longBreakBtn">Длинный</button> 
        </div>
        
        <div id="pomodoroCount" class="pomodoro-count">Pomodoro: 0</div>
        
        <div class="progressbar">
            <div class="progress-inner">
                <h2 id="timerDisplay">25:00</h2> 
            </div>
        </div>
        
        <div class="controls">
            <button id="startBtn">Старт</button> 
            <button id="pauseBtn">Пауза</button>
            <button id="resetBtn">Сброс</button> 
        </div>
    </div>

    <script src="js/storage.js"></script> 
    <script src="js/timer.js"></script>  
    <script src="js/main.js"></script>   
</body>
</html>
